<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where is the Line?</title>
    <style>
        :root { --bg: #121212; --text: #eee; }
        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container { width: 90%; max-width: 600px; text-align: center; }
        
        select {
            background: #333;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #555;
            font-size: 1rem;
        }

        .spectrum-container {
            position: relative;
            height: 250px;
            width: 100%;
            border-radius: 15px;
            cursor: ew-resize;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            margin-bottom: 20px;
        }

        #divider {
            position: absolute;
            top: 0; bottom: 0; width: 4px;
            background: white;
            transform: translateX(-50%);
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .results { font-size: 1.2rem; margin-top: 10px; }
        .hex { font-family: monospace; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Define the Boundary</h1>
        <label for="pair-select">Choose your spectrum:</label><br>
        <select id="pair-select">
            <option value="green-blue" selected>Green vs Blue</option>
            <option value="orange-red">Orange vs Red</option>
            <option value="yellow-green">Yellow vs Green</option>
            <option value="purple-pink">Purple vs Pink</option>
        </select>

        <div class="spectrum-container" id="spectrum">
            <div id="divider"></div>
        </div>

        <div class="results">
            Boundary: <span id="hex-display" class="hex">#00FFD5</span>
            <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">
                Hue: <span id="hue-display">170</span>°
            </div>
        </div>
    </div>

    <script>
        const spectrum = document.getElementById('spectrum');
        const divider = document.getElementById('divider');
        const hexDisplay = document.getElementById('hex-display');
        const hueDisplay = document.getElementById('hue-display');
        const pairSelect = document.getElementById('pair-select');

        // Color configurations (Hue values in degrees)
        const colorMap = {
            'green-blue': { start: 120, end: 220 },
            'orange-red': { start: 30, end: 0 },
            'yellow-green': { start: 60, end: 120 },
            'purple-pink': { start: 270, end: 330 }
        };

        let currentRange = colorMap['green-blue'];

        function updateGradient() {
            const { start, end } = currentRange;
            spectrum.style.background = `linear-gradient(to right, hsl(${start}, 100%, 50%), hsl(${end}, 100%, 50%))`;
        }

        function updateBoundary(e) {
            const rect = spectrum.getBoundingClientRect();
            let x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            
            const percent = x / rect.width;
            const hue = currentRange.start + (percent * (currentRange.end - currentRange.start));
            
            divider.style.left = (percent * 100) + '%';
            const hex = hslToHex(hue, 100, 50);
            hexDisplay.innerText = hex.toUpperCase();
            hexDisplay.style.color = `hsl(${hue}, 100%, 50%)`;
            hueDisplay.innerText = Math.round(hue);
        }

        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        pairSelect.addEventListener('change', (e) => {
            currentRange = colorMap[e.target.value];
            updateGradient();
            // Reset divider to middle on change
            updateBoundary({ clientX: spectrum.getBoundingClientRect().left + (spectrum.offsetWidth / 2) });
        });

        // Mouse & Touch Listeners
        const moveHandler = (e) => updateBoundary(e);
        spectrum.addEventListener('mousedown', (e) => {
            updateBoundary(e);
            window.addEventListener('mousemove', moveHandler);
        });
        window.addEventListener('mouseup', () => window.removeEventListener('mousemove', moveHandler));
        
        spectrum.addEventListener('touchstart', (e) => {
            updateBoundary(e);
            window.addEventListener('touchmove', moveHandler);
        });
        window.addEventListener('touchend', () => window.removeEventListener('touchmove', moveHandler));

        // Init
        updateGradient();
        setTimeout(() => updateBoundary({ clientX: spectrum.getBoundingClientRect().left + (spectrum.offsetWidth / 2) }), 100);
    </script>
</body>
</html>
